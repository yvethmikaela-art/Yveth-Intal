openapi: 3.0.0
info:
  title: Mt. Grace Protect API
  version: 1.0.0
  description: Authentication API para sa Mt. Grace Protect — Mt. Grace Hospitals Inc.

servers:
  - url: http://localhost/user
    description: Local Development Server

paths:
  /registration:
    post:
      summary: Register a new user
      description: Gumagawa ng bagong user account. Kasama ang personal info at account setup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - phone_number
                - address
                - password
                - terms_accepted
              properties:
                first_name:
                  type: string
                  example: Juan
                last_name:
                  type: string
                  example: Dela Cruz
                email:
                  type: string
                  format: email
                  example: juan@email.com
                phone_number:
                  type: string
                  example: "09171234567"
                address:
                  type: string
                  example: 123 Sample St, Quezon City
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                terms_accepted:
                  type: boolean
                  example: true
      responses:
        '200':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  id:
                    type: integer
                    example: 12
                  message:
                    type: string
                    example: User successfully registered!
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Email already exists!
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: object

  /login:
    post:
      summary: Login user
      description: Mag-login gamit ang email at password. Ibabalik ang access token na gagamitin sa protected endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: juan@email.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Login successful!
                  access_token:
                    type: string
                    example: 2758dcf0628caff44713623b272aa08cb7eb290e
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      first_name:
                        type: string
                        example: Juan
                      last_name:
                        type: string
                        example: Dela Cruz
                      email:
                        type: string
                        example: juan@email.com
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Invalid email or password!

  /:
    get:
      summary: Get all users
      description: Ibabalik ang listahan ng lahat ng users. Kailangan ng Bearer token mula sa login.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        firstname:
                          type: string
                          example: Juan
                        lastname:
                          type: string
                          example: Dela Cruz
                        email:
                          type: string
                          example: juan@email.com
                        created_at:
                          type: string
                          example: "2026-06-07 14:18:43"
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Token is required!

  /{id}:
    get:
      summary: Get specific user
      description: Ibabalik ang details ng isang specific na user base sa ID. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstname:
                        type: string
                        example: Juan
                      lastname:
                        type: string
                        example: Dela Cruz
                      email:
                        type: string
                        example: juan@email.com
                      created_at:
                        type: string
                        example: "2026-06-07 14:18:43"
        '401':
          description: Token missing or invalid
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: User not found!

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer