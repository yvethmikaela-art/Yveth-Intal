openapi: 3.0.0
info:
  title: Mt. Grace Protect API
  version: 2.0.0
  description: Authentication & Users/Staff Management API para sa Mt. Grace Protect — Mt. Grace Hospitals Inc.

servers:
  - url: http://localhost
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

paths:
  /user/registration:
    post:
      summary: Register a new user
      description: Gumagawa ng bagong user account. Kasama ang personal info at account setup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - phone_number
                - address
                - password
                - confirm_password
                - terms_accepted
              properties:
                first_name:
                  type: string
                  example: Juan
                last_name:
                  type: string
                  example: Dela Cruz
                email:
                  type: string
                  format: email
                  example: juan@email.com
                phone_number:
                  type: string
                  example: "09171234567"
                address:
                  type: string
                  example: 123 Sample St, Quezon City
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                confirm_password:
                  type: string
                  format: password
                  example: password123
                terms_accepted:
                  type: boolean
                  example: true
                dept_id:
                  type: integer
                  example: 1
                  nullable: true
                branch_id:
                  type: integer
                  example: 1
                  nullable: true
      responses:
        '200':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  id:
                    type: integer
                    example: 1
                  message:
                    type: string
                    example: User successfully registered!
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Email already exists!
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: object

  /user/login:
    post:
      summary: Login user
      description: Mag-login gamit ang email at password. Ibabalik ang access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: juan@email.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Login successful!
                  access_token:
                    type: string
                    example: 2758dcf0628caff44713623b272aa08cb7eb290e
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      first_name:
                        type: string
                        example: Juan
                      last_name:
                        type: string
                        example: Dela Cruz
                      email:
                        type: string
                        example: juan@email.com
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Invalid email or password!

  /user:
    get:
      summary: Get all users
      description: Ibabalik ang listahan ng lahat ng users kasama ang department, branch, at last login. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        first_name:
                          type: string
                          example: Juan
                        last_name:
                          type: string
                          example: Dela Cruz
                        email:
                          type: string
                          example: juan@email.com
                        address:
                          type: string
                          example: Quezon City
                        phone_number:
                          type: string
                          example: "09171234567"
                        status:
                          type: string
                          example: Active
                        department:
                          type: string
                          example: Cardiology
                        branch:
                          type: string
                          example: Taguig HQ
                        last_login:
                          type: string
                          example: "2026-06-22 10:00:00"
                        created_at:
                          type: string
                          example: "2026-06-22 10:00:00"
        '401':
          description: Token missing or invalid

  /user/{id}:
    get:
      summary: Get specific user
      description: Ibabalik ang details ng isang specific na user. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      first_name:
                        type: string
                        example: Juan
                      last_name:
                        type: string
                        example: Dela Cruz
                      email:
                        type: string
                        example: juan@email.com
                      department:
                        type: string
                        example: Cardiology
                      branch:
                        type: string
                        example: Taguig HQ
                      last_login:
                        type: string
                        example: "2026-06-22 10:00:00"
        '401':
          description: Token missing or invalid
        '404':
          description: User not found

    put:
      summary: Update user
      description: I-update ang existing user. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - address
                - phone_number
                - status
              properties:
                first_name:
                  type: string
                  example: Juan
                last_name:
                  type: string
                  example: Dela Cruz
                email:
                  type: string
                  format: email
                  example: juan@email.com
                address:
                  type: string
                  example: Makati City
                phone_number:
                  type: string
                  example: "09171234567"
                dept_id:
                  type: integer
                  example: 2
                  nullable: true
                branch_id:
                  type: integer
                  example: 1
                  nullable: true
                status:
                  type: string
                  example: Active
      responses:
        '200':
          description: User successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: User successfully updated!
        '401':
          description: Token missing or invalid
        '404':
          description: User not found
        '409':
          description: Email already exists

  /user/{id}/delete:
    post:
      summary: Delete user
      description: Tanggalin ang existing user. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: User successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: User successfully deleted!
        '401':
          description: Token missing or invalid
        '404':
          description: User not found

  /branches:
    get:
      summary: Get all branches
      description: Ibabalik ang listahan ng lahat ng branches. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Taguig HQ
                        location:
                          type: string
                          example: Taguig City
        '401':
          description: Token missing or invalid

  /departments:
    get:
      summary: Get all departments
      description: Ibabalik ang listahan ng lahat ng departments. Kailangan ng Bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Cardiology
        '401':
          description: Token missing or invalid